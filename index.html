<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofi Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 pb-12">

    <div id="app"></div>

    <script>
        // --- SUPABASE CLIENT INITIALIZATION (የተስተካከለ አጻጻፍ) ---
        const SUPABASE_URL = "https://loakmxenkegxlusahfoo.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvYWtteGVua2VneGx1c2FoZm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTE5NjQsImV4cCI6MjA5ODQyNzk2NH0.4PRvUWO8cxdTXdSZ2Cgtamfo2I_VZ7BxAVVHu-7BIUY";
        
        // window.supabase መኖሩን ማረጋገጫ
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- APP STATE ---
        let currentRole = 'customer';
        let currentLang = 'AM';
        let menuItems = [];

        // --- TRANSLATIONS ---
        const t = {
            AM: { title: "ሶፊ ሬስቶራንት", subtitle: "ትኩስ። ፈጣን። የቤት ውስጥ ጣዕም፡፡", customer: "ደንበኛ", kitchen: "ኩሽና", admin: "አስተዳዳሪ", standardMenu: "የተመዘገቡ ምግቦች", loading: "በመጫን ላይ..." },
            EN: { title: "Sofi Restaurant", subtitle: "FRESH. FAST. HOME-STYLE.", customer: "Customer", kitchen: "Kitchen", admin: "Admin", standardMenu: "Menu Items", loading: "Loading..." }
        };

        // --- FETCH DATA FROM SUPABASE ---
        async function fetchMenu() {
            try {
                const { data, error } = await supabaseClient.from('menu_items').select('*');
                if (data && data.length > 0) {
                    menuItems = data;
                } else {
                    // ዳታቤዝህ ባዶ ከሆነ ማሳያ Dummy Data (ለሙከራ)
                    menuItems = [
                        { id: 1, name_am: "ልዩ በየአይነቱ", name_en: "Special Beyaynetu", price: 250 },
                        { id: 2, name_am: "ክትፎ", name_en: "Kitfo", price: 450 },
                        { id: 3, name_am: "ማኪያቶ", name_en: "Macchiato", price: 70 }
                    ];
                }
            } catch (err) {
                console.error("Supabase error:", err);
            }
            renderApp();
        }

        // --- RENDER UI ---
        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-xl font-bold text-amber-500">${t[currentLang].title}</h1>
                            <p class="text-xs text-gray-400">${t[currentLang].subtitle}</p>
                        </div>
                        <button onclick="toggleLang()" class="bg-slate-800 px-3 py-1.5 rounded-full text-xs font-semibold text-amber-400">
                            ${currentLang === 'EN' ? 'አማርኛ' : 'English'}
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-1 bg-slate-950 p-1 rounded-lg text-xs mt-3 text-center">
                        <button onclick="setRole('customer')" class="py-2 rounded transition ${currentRole === 'customer' ? 'bg-amber-500 text-slate-950 font-bold shadow' : 'text-gray-400'}">${t[currentLang].customer}</button>
                        <button onclick="setRole('kitchen')" class="py-2 rounded transition ${currentRole === 'kitchen' ? 'bg-amber-500 text-slate-950 font-bold shadow' : 'text-gray-400'}">${t[currentLang].kitchen}</button>
                        <button onclick="setRole('admin')" class="py-2 rounded transition ${currentRole === 'admin' ? 'bg-amber-500 text-slate-950 font-bold shadow' : 'text-gray-400'}">${t[currentLang].admin}</button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center mt-4">
                        <div class="text-emerald-600 font-bold text-xs flex items-center justify-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span>
                            ከ Supabase ጋር ተገናኝቷል
                        </div>
                        <p class="text-[11px] text-gray-400 mt-1">ክፍል፦ <span class="font-bold text-slate-700 uppercase">${currentRole}</span></p>
                    </div>

                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider mt-6 mb-3">${t[currentLang].standardMenu}</h3>
                    
                    <div class="space-y-3">
                        ${menuItems.map(item => `
                            <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm hover:border-gray-200 transition">
                                <div>
                                    <h4 class="font-bold text-sm text-slate-900">${currentLang === 'EN' ? item.name_en : item.name_am}</h4>
                                    <p class="text-xs text-amber-600 font-black mt-1">${item.price} ብር</p>
                                </div>
                                <button class="bg-slate-900 hover:bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg font-semibold transition active:scale-95">
                                    + ጨምር
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </main>
            `;
            // Lucide icons ሪፍሬሽ ለማድረግ
            if (window.lucide) window.lucide.createIcons();
        }

        function setRole(role) { currentRole = role; renderApp(); }
        function toggleLang() { currentLang = currentLang === 'EN' ? 'AM' : 'EN'; renderApp(); }

        // ገጹ ሲከፈት መረጃውን አምጣ
        fetchMenu();
    </script>
</body>
</html>
