<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofi Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 pb-12">

    <div id="app"></div>

    <script>
        // --- SUPABASE CLIENT INITIALIZATION ---
        const SUPABASE_URL = "https://loakmxenkegxlusahfoo.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvYWtteGVua2VneGx1c2FoZm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTE5NjQsImV4cCI6MjA5ODQyNzk2NH0.4PRvUWO8cxdTXdSZ2Cgtamfo2I_VZ7BxAVVHu-7BIUY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- APP STATE ---
        let currentRole = 'customer';
        let currentLang = 'AM';
        let menuItems = [];
        let cart = {};

        // --- TRANSLATIONS ---
        const t = {
            AM: { title: "ሶፊ ሬስቶራንት", subtitle: "ትኩስ። ፈጣን። የቤት ውስጥ ጣዕም፡፡", customer: "ደንበኛ", kitchen: "ኩሽና", admin: "አስተዳዳሪ" },
            EN: { title: "Sofi Restaurant", subtitle: "FRESH. FAST. HOME-STYLE.", customer: "Customer", kitchen: "Kitchen", admin: "Admin" }
        };

        // --- FETCH DATA ---
        async function fetchMenu() {
            const { data, error } = await supabase.from('menu_items').select('*');
            if (data) {
                menuItems = data;
                renderApp();
            }
        }

        // --- RENDER UI ---
        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-xl font-bold text-amber-500">${t[currentLang].title}</h1>
                            <p class="text-xs text-gray-400">${t[currentLang].subtitle}</p>
                        </div>
                        <button onclick="toggleLang()" class="bg-slate-800 px-3 py-1 rounded-full text-xs font-semibold text-amber-400">
                            ${currentLang === 'EN' ? 'አማርኛ' : 'English'}
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-1 bg-slate-950 p-1 rounded-lg text-xs mt-3 text-center">
                        <button onclick="setRole('customer')" class="py-2 rounded ${currentRole === 'customer' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-400'}">${t[currentLang].customer}</button>
                        <button onclick="setRole('kitchen')" class="py-2 rounded ${currentRole === 'kitchen' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-400'}">${t[currentLang].kitchen}</button>
                        <button onclick="setRole('admin')" class="py-2 rounded ${currentRole === 'admin' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-400'}">${t[currentLang].admin}</button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-4">
                    <div class="bg-white p-6 rounded-2xl shadow border border-gray-100 text-center mt-6">
                        <div class="text-emerald-500 font-bold text-sm mb-2">● ከ Supabase ዳታቤዝ ጋር ተገናኝቷል</div>
                        <p class="text-xs text-gray-500">የአሁኑ ገጽታ፡ <span class="font-bold text-slate-800 uppercase">${currentRole}</span></p>
                    </div>

                    <div class="mt-6 space-y-3">
                        ${menuItems.map(item => `
                            <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                                <div>
                                    <h4 class="font-bold text-sm">${currentLang === 'EN' ? item.name_en : item.name_am}</h4>
                                    <p class="text-xs text-amber-600 font-bold mt-1">${item.price} ብር</p>
                                </div>
                                <button class="bg-slate-900 text-white text-xs px-3 py-1.5 rounded-lg font-semibold">ወደ ጋሪ</button>
                            </div>
                        `).join('')}
                    </div>
                </main>
            `;
        }

        function setRole(role) { currentRole = role; renderApp(); }
        function toggleLang() { currentLang = currentLang === 'EN' ? 'AM' : 'EN'; renderApp(); }

        // Initial Load
        fetchMenu();
    </script>
</body>
</html>
